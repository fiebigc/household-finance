name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # ubuntu-latest queues can occasionally fail with "job was not acquired by Runner".
    # Re-run workflow; see https://www.githubstatus.com — not a repo code failure.
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint types & bundle (web + cloud-ready)
        run: npm run build

      - name: Bundle WebKit standalone (no Supabase client)
        run: npm run build:webkit

      - name: Tests
        run: npm test
